name: tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 7 * * *"  # nightly 07:00 UTC
  workflow_dispatch:

# Runs on the self-hosted Spartan CPU runner. GitHub label: spartan-cpu.
# The runner srun --overlaps an ALREADY-RUNNING SLURM lease — never
# sbatch-and-wait (no allocation guarantee). Pending leases are never used.
#
# CI runs INSIDE a reused, pre-built SIF (~/.scitex/dev/containers/ci-cpu.sif,
# on punim0264) — the SIF bakes python3.11/3.12/3.13 + the curated ecosystem
# dep union (scientific core + scitex basics + scitex-dev[all,dev] + pytest),
# so each run only overlays the checkout via PYTHONPATH (no per-run install).
# The SIF IS the cache. Rebuild it with `scitex-container apptainer build
# ci-cpu` when the dependency set changes.
#
# fail-fast / fail-loud / NO silent fallbacks: a missing SIF or a missing dep
# is a hard error, never a reinstall fallback.
jobs:
  test:
    # Job name kept verbatim — this is the required status check.
    name: pytest-matrix-on-ubuntu-py${{ matrix.python-version }}
    runs-on: [self-hosted, Linux, X64, spartan-cpu]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Run tests in the reused CI SIF (apptainer exec — no per-run install)
        run: |
          set -euo pipefail
          # The runner's job shell is --noprofile --norc (no Lmod), so put the
          # self-contained apptainer shim on PATH (it execs the real Apptainer
          # binary directly — no `module`, no login shell).
          export PATH="$HOME/.env-3.11/bin:$PATH"
          command -v apptainer >/dev/null || { echo "::error::apptainer shim not on PATH (~/.env-3.11/bin)"; exit 1; }
          IMG="$HOME/.scitex/dev/containers/ci-cpu.sif"
          if [ ! -f "$IMG" ]; then
            echo "::error::CI SIF missing at $IMG — rebuild it: scitex-container apptainer build ci-cpu"
            exit 1
          fi
          V="${{ matrix.python-version }}"
          # apptainer scratch on punim0264 — HOME stays clean.
          export APPTAINER_TMPDIR=/data/gpfs/projects/punim0264/ywatanabe/ci/apptainer-tmp
          mkdir -p "$APPTAINER_TMPDIR"
          # Read-only SIF, NO install (no --writable-tmpfs): the in-container
          # setup (PYTHONPATH=src + the baked venv bin on PATH) lives in
          # .github/ci/run-in-sif.sh. --bind punim0264 so the $HOME/.scitex
          # symlink (-> punim0264) resolves inside the container.
          apptainer exec --pwd "$PWD" --bind /data/gpfs/projects/punim0264 \
            "$IMG" bash .github/ci/run-in-sif.sh "$V"

      - name: Upload coverage to Codecov
        if: always() && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false
